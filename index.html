<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار اللغة الإنجليزية - English Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Start Screen -->
    <div id="startScreen" class="screen active">
        <div class="container">
            <h1 class="title">🎓 اختبار اللغة الإنجليزية</h1>
            <p class="subtitle">تصميم المهندس عمر موسى</p>
            
            <div class="question-selector">
                <h2> Choose Number of Questions</h2>
                
                <div class="button-grid">
                    <button class="select-btn" data-count="10">10 أسئلة</button>
                    <button class="select-btn" data-count="20">20 سؤال</button>
                    <button class="select-btn" data-count="30">30 سؤال</button>
                    <button class="select-btn" data-count="40">40 سؤال</button>
                    <button class="select-btn" data-count="50">50 سؤال</button>
                    <button class="select-btn" data-count="all"> All</button>
                </div>

                <div class="important-model-section">
                    <button class="select-btn important-model-btn" data-count="important-model">📌 نموذج مهم</button>
                </div>

                <div class="new-model-section">
                    <button class="select-btn new-model-btn" data-count="new-model">📝 نموذج جديد</button>
                </div>
                
                <div class="custom-input">
                    <label for="customCount"> Custom Number:</label>
                    <div class="input-group">
                        <input type="number" id="customCount" min="1" max="150" placeholder="مثال: 15">
                        <button id="startCustomBtn" class="btn-primary">ابدأ الاختبار / Start</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quizScreen" class="screen">
        <div class="container">
            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-info">
                    <span id="currentQuestion">1</span> / <span id="totalQuestions">0</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>

            <!-- Score Display -->
            <div class="score-display">
                <span class="score-label"> Score:</span>
                <span id="currentScore">0</span> / <span id="totalScore">0</span>
            </div>

            <!-- Question Container -->
            <div class="question-container" dir="ltr">
                <h2 id="questionText" class="question-text"></h2>
                <div id="answersContainer" class="answers-container"></div>
            </div>

            <!-- Navigation Buttons -->
            <div class="navigation">
                <button id="prevBtn" class="btn-nav" disabled>⏮ السابق / Previous</button>
                <button id="nextBtn" class="btn-nav">التالي / Next ⏭</button>
            </div>
            
            <!-- Finish Quiz Button -->
            <div class="finish-quiz-container">
                <button id="finishQuizBtn" class="btn-finish">Finish Quiz Now</button>
            </div>
            
            <!-- Footer Credit -->
            <div class="footer-credit">
                <span class="icon">💙</span> إذا أعجبك الموقع لا تنسى المطور من الدعاء <span class="icon">🤲</span>
            </div>
        </div>
    </div>

    <!-- Results Screen -->
    <div id="resultsScreen" class="screen">
        <div class="container">
            <div class="results-container">
                <h1 class="title">🎉 انتهى الاختبار!</h1>
                <p class="subtitle">Quiz Completed!</p>
                
                <div class="results-card">
                    <div class="result-item">
                        <span class="result-label"> Total Score:</span>
                        <span class="result-value" id="finalScore">0 / 0</span>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">Percentage:</span>
                        <span class="result-value" id="percentage">0%</span>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label"> Correct Answers:</span>
                        <span class="result-value success" id="correctCount">0</span>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label"> Wrong Answers:</span>
                        <span class="result-value error" id="wrongCount">0</span>
                    </div>
                </div>
                
                <div class="performance-message" id="performanceMessage"></div>
                
                <button id="restartBtn" class="btn-primary large">🔄 Restart Quiz</button>
                
                <!-- Footer Credit -->
                <div class="footer-credit">
                    <span class="icon">💙</span> إذا أعجبك الموقع لا تنسى المطور من الدعاء <span class="icon">🤲</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
